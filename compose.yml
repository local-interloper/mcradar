services:
  mc-radar:
    container_name: mc-radar
    image: local-interloper/mc-radar
    build: .

    env_file: .env

    depends_on:
      db:
        condition: service_healthy

    networks:
      - mc-radar-network

  db:
    container_name: mc-radar-db
    image: postgres:18.3
    restart: unless-stopped
    shm_size: 128mb
    command: -c 'max_connections=512'

    env_file: .env

    ports:
      - ${POSTGRES_PORT}:5432

    volumes:
      - "mc-radar-db-volume:/var/lib/postgresql/18/docker"

    networks:
      - mc-radar-network

    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  mc-radar-db-volume:


networks:
  mc-radar-network:
